spring:
  application:
    name: agent-user

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nifty_trading}
    username: ${DB_USERNAME:nifty_user}
    password: ${DB_PASSWORD:nifty_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-test-query: SELECT 1
      connection-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: zupptrade_dev
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: zupptrade_dev
    init-sql: "SET search_path TO zupptrade_dev"

  mvc:
    problemdetails:
      enabled: true

server:
  port: 8086

upstox:
  api:
    base-url: https://api.upstox.com
    access-token: ${UPSTOX_ACCESS_TOKEN:}
    token-encryption-key: ${TOKEN_ENCRYPTION_KEY:}

logging:
  level:
    com.the3Cgrp.zupptrade.agentUser: INFO
