# ──────────────────────────────────────────────────────────────────────────────
# CI: build the Maven reactor once, then build + push Docker images to GHCR.
#
# Builds the 6 reactor modules (agent1-5 + agent-user). upstox-auth is a separate
# repo (gitignored here, not a reactor module) and has its own pipeline.
#
# Images: ghcr.io/<owner-lowercased>/zupptrade-<svc>:{latest, <short-sha>}
# Auth   : built-in GITHUB_TOKEN (no PAT needed to push).
# ──────────────────────────────────────────────────────────────────────────────
name: build-and-push

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Runs unit tests; integration/token-print groups are excluded by the parent pom default.
      - name: Build all modules
        run: mvn -B clean package

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push images
        env:
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"   # GHCR requires a lowercase owner
          short="${SHA:0:7}"

          # module directory  ->  image name
          declare -A svc=(
            [agent1-market_analyst]=zupptrade-agent1
            [agent2-recommendation]=zupptrade-agent2
            [agent3-monitor]=zupptrade-agent3
            [agent4-backtest]=zupptrade-agent4
            [agent5-execution]=zupptrade-agent5
            [agent-user]=zupptrade-agent-user
          )

          for dir in "${!svc[@]}"; do
            img="ghcr.io/${owner}/${svc[$dir]}"
            echo "::group::Building ${img} from ${dir}"
            docker build -t "${img}:latest" -t "${img}:${short}" "${dir}"
            docker push "${img}:latest"
            docker push "${img}:${short}"
            echo "::endgroup::"
          done
