# Serves the built Angular app and proxies /api/agentN/* to the internal agents.
# Mirrors zupptrade-ui/proxy.conf.json: /api/agentN -> http://agentN:808X/api/v1/agentN
#
# IMPORTANT: uses Docker's embedded DNS (127.0.0.11) + a variable in proxy_pass so agent
# hostnames are re-resolved at REQUEST time. Without this, nginx resolves the name once at
# startup and caches it — a recreated agent gets a new IP and every call 502s until the UI
# is restarted. The `set` + `rewrite ... break` pattern is required because a variable in
# proxy_pass disables nginx's automatic location-prefix rewriting.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/agent1/ {
        set $svc agent1;
        rewrite ^/api/agent1/(.*)$ /api/v1/agent1/$1 break;
        proxy_pass http://$svc:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/agent2/ {
        set $svc agent2;
        rewrite ^/api/agent2/(.*)$ /api/v1/agent2/$1 break;
        proxy_pass http://$svc:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/agent3/ {
        set $svc agent3;
        rewrite ^/api/agent3/(.*)$ /api/v1/agent3/$1 break;
        proxy_pass http://$svc:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/agent4/ {
        set $svc agent4;
        rewrite ^/api/agent4/(.*)$ /api/v1/agent4/$1 break;
        proxy_pass http://$svc:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/agent5/ {
        set $svc agent5;
        rewrite ^/api/agent5/(.*)$ /api/v1/agent5/$1 break;
        proxy_pass http://$svc:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/agent-user/ {
        set $svc agent-user;
        rewrite ^/api/agent-user/(.*)$ /api/v1/agent-user/$1 break;
        proxy_pass http://$svc:8086;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — Angular client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
