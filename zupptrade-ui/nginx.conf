# Serves the built Angular app and proxies /api/agentN/* to the internal agents.
# Mirrors zupptrade-ui/proxy.conf.json: /api/agentN -> http://agentN:808X/api/v1/agentN
# This container is the ONLY thing NPM proxies to; agents stay internal on zupptrade-net.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Backend API proxying ─────────────────────────────────────────────────
    location /api/agent1/     { proxy_pass http://agent1:8081/api/v1/agent1/;        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /api/agent2/     { proxy_pass http://agent2:8082/api/v1/agent2/;        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /api/agent3/     { proxy_pass http://agent3:8083/api/v1/agent3/;        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /api/agent4/     { proxy_pass http://agent4:8084/api/v1/agent4/;        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /api/agent5/     { proxy_pass http://agent5:8085/api/v1/agent5/;        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /api/agent-user/ { proxy_pass http://agent-user:8086/api/v1/agent-user/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }

    # ── SPA fallback — Angular client-side routing ───────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
