# ── Sandbox profile ────────────────────────────────────────────────────────────
# Activate with: -Dspring.profiles.active=sandbox
#
# Margin check  → api.upstox.com        (real production API, UPSTOX_ACCESS_TOKEN)
# Order placement → api-sandbox.upstox.com (sandbox, UPSTOX_SANDBOX_TOKEN)
#
# This gives real margin figures while placing zero-risk sandbox orders.
# ───────────────────────────────────────────────────────────────────────────────

upstox:
  api:
    # Market data and margin check remain on the real Upstox API
    base-url: https://api.upstox.com
    # Orders route to sandbox — not a secret, lives here
    order-base-url: https://api-sandbox.upstox.com
    # Sandbox token for the order RestClient (UPSTOX_SANDBOX_TOKEN set as system env var)
    order-access-token: ${UPSTOX_SANDBOX_TOKEN:}

agent5:
  execution:
    fill-poll-interval-ms: 5000
    fill-timeout-ms: 30000
    slippage-alert-threshold: "0.10"
    product: D
    # Cancel on timeout in sandbox rather than converting to MARKET —
    # sandbox fills don't reflect real liquidity
    cancel-on-timeout-instead-of-market: true
    # Bypass margin sufficiency check in sandbox — Upstox /v2/charges/margin does not return
    # available_margin; account funds are checked via /v2/user/fund-and-margin in production.
    # Set true here so the execution flow can be tested end-to-end without a funded account.
    bypass-margin-check: true
    # Upstox sandbox does not carry weekly NIFTY option contracts in its instrument master.
    # When true: skip multi/place entirely and inject synthetic fills at limitPrice so the
    # downstream flow (slippage check, fill persistence, ACTIVE status) can be exercised.
    simulate-fills: true
    # When true: skip exit order placement and mark the trade CLOSED directly.
    # Mirrors simulate-fills for the exit path — sandbox cannot place exit orders on
    # weekly NIFTY instruments either.
    simulate-exit: true

logging:
  level:
    com.the3Cgrp.zupptrade.agent5: DEBUG
    org.springframework.web.client: DEBUG
