spring:
  application:
    name: agent2-recommendation

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nifty_trading}
    username: ${DB_USERNAME:nifty_user}
    password: ${DB_PASSWORD:nifty_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-test-query: SELECT 1
      connection-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: zupptrade_dev
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: zupptrade_dev
    init-sql: "SET search_path TO zupptrade_dev"

  mvc:
    problemdetails:
      enabled: true

server:
  port: 8082

trading:
  vix-low-threshold: 13
  vix-normal-threshold: 18
  vix-high-threshold: 24
  iv-hv-rich-threshold: 1.05
  iv-hv-cheap-threshold: 0.85
  risk-free-rate: 0.065
  min-pop-sell-spread: 80
  min-pop-debit-spread: 35
  max-pop-popp-gap: 15
  min-roc-base-pct: 0.5
  slippage-alert-threshold: 0.10
  trade-card-valid-minutes: 20
  upstox:
    base-url: ${UPSTOX_BASE_URL:https://api.upstox.com}
    access-token: ${UPSTOX_ACCESS_TOKEN:}        # fallback if DB token loading is unavailable
    token-encryption-key: ${TOKEN_ENCRYPTION_KEY:} # empty default — DB loader skips if not set
    nifty-instrument-key: "NSE_INDEX|Nifty 50"
    connect-timeout-seconds: 10
    read-timeout-seconds: 15
    retry-max: 3
